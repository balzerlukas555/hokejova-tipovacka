<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipovačka</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4242/4242141.png">
    <link rel="icon" type="image/png" sizes="192x192" href="https://cdn-icons-png.flaticon.com/512/4242/4242141.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/4242/4242098.png" type="image/png">
    <meta name="theme-color" content="#0f172a">
    
    <style>
        /* INTRO */
        #intro { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0f172a; display: flex; align-items: center; justify-content: center; 
            z-index: 9999; transition: opacity 0.8s ease-out, visibility 0.8s; 
        }
        #intro.hidden { opacity: 0; visibility: hidden; }
        .logo-intro { 
            width: 120px; 
            filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.5));
            animation: pulse 1.5s ease-in-out forwards;
        }
        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding: 10px; line-height: 1.5; }
        h1 { color: #3b82f6; margin: 15px 0; }
        h2 { font-size: 22px; }
        h3 { color: #94a3b8; margin: 20px 0 10px 0; }
        
        .menu-bar { margin: 20px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        button { padding: 10px 18px; border: none; border-radius: 8px; background: #3b82f6; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; touch-action: manipulation; }
        button:active { transform: scale(0.95); }
        button:disabled { background: #475569 !important; cursor: not-allowed; opacity: 0.6; }
        
        .btn-alt { background: #475569; }
        .btn-archive-trigger { background: #6366f1; }
        .success { background: #059669 !important; }
        .danger { background: #991b1b !important; }

        /* ZÁPASY */
        #matches { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .match { background: #1e293b; padding: 20px; border-radius: 12px; width: 100%; max-width: 450px; border: 1px solid #334155; position: relative; box-sizing: border-box; }
        .live-badge { position: absolute; top: 10px; right: 10px; background: #991b1b; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .match-info { color: #94a3b8; font-size: 13px; display: block; }
        .match-status { color: #3b82f6; font-size: 14px; font-weight: bold; margin: 5px 0; display: block; }

        /* TABULKA */
        .tableWrap { width: 100%; max-width: 1000px; margin: 20px auto; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: center; }
        .tip-exact { background: #065f46 !important; color: #6ee7b7 !important; font-weight: bold; }
        .tip-tendency { background: #854d0e !important; color: #fde047 !important; }
        .my-row { border: 2px solid #3b82f6 !important; background: #1e294b !important; }

        /* MOBILNÍ RESPONSIVITA TABULKY */
        @media (max-width: 600px) {
            thead { display: none; }
            tr { display: block; margin-bottom: 15px; border: 1px solid #334155; border-radius: 10px; padding: 10px; background: #1e293b; }
            td { display: flex; justify-content: space-between; padding: 8px 5px; border: none; border-bottom: 1px solid #2d3748; text-align: right; }
            td::before { content: attr(data-label); font-weight: bold; text-align: left; color: #94a3b8; }
            td:last-child { border-bottom: none; }
        }

        /* ADMIN */
        .admin { background: #111827; padding: 20px; display: none; border-radius: 12px; max-width: 650px; margin: 20px auto; border: 2px dashed #ef4444; box-sizing: border-box; }
        .admin-item, .player-item, .archive-manage-item { background: #1e293b; padding: 15px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #444; }
        .player-item, .archive-manage-item { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; text-align: left; }
        input { padding: 10px; margin: 5px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #475569; width: 85%; }

        /* ARCHIV */
        #archiveSection { display: none; margin: 20px auto; padding: 15px; background: #1e293b; border-radius: 10px; max-width: 500px; text-align: left; }
        .archive-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #334155; align-items: center; }
        .archive-date { font-size: 11px; color: #94a3b8; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="intro"><img src="https://cdn-icons-png.flaticon.com/512/4242/4242141.png" class="logo-intro"></div>

    <div style="margin-top: 20px;"><img src="https://cdn-icons-png.flaticon.com/512/4242/4242141.png" style="width: 60px;"></div>
    <h1>Tipovačka</h1>
    
    <div class="menu-bar">
        <button onclick="window.changeName()" class="btn-alt">Změnit jméno</button>
        <button onclick="window.toggleArchive()" class="btn-archive-trigger">Archiv</button>
        <button onclick="window.adminLogin()" class="btn-alt">Admin sekce</button>
    </div>

    <div id="matches">Načítám zápasy...</div>

    <h2>Tabulka výsledků</h2>
    <div class="tableWrap"><table id="playersTable"></table></div>

    <div id="archiveSection">
        <h3 style="text-align:center; margin-top:0; color:white;">Archiv výsledků</h3>
        <div id="archiveList"></div>
    </div>

    <div id="adminPanel" class="admin">
        <h2>Admin Panel</h2>
        <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:20px;">
            <button onclick="window.addMatch()" class="success">Přidat zápas</button>
            <button onclick="window.clearAllData()" class="danger">Smazat vše</button>
            <button onclick="document.getElementById('adminPanel').style.display='none'" class="btn-alt">Zavřít</button>
        </div>

        <hr style="border:0; border-top:1px solid #334155; margin:20px 0;">
        <h3>Správa hráčů</h3>
        <div id="adminPlayers"></div>

        <hr style="border:0; border-top:1px solid #334155; margin:20px 0;">
        <h3>Správa zápasů</h3>
        <div id="adminMatches"></div>

        <hr style="border:0; border-top:1px solid #334155; margin:20px 0;">
        <h3>Správa archivu</h3>
        <div id="adminArchive"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC2xPE4YnIanTiRgrwsoXgoclTyOq0BraE",
        authDomain: "tipovacka-fce0e.firebaseapp.com",
        databaseURL: "https://tipovacka-fce0e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "tipovacka-fce0e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let matches = {}, tips = {}, points = {}, pId = localStorage.getItem("pId") || "p"+Math.random().toString(16).slice(2);
    localStorage.setItem("pId", pId);

    window.addEventListener('load', () => setTimeout(() => document.getElementById('intro').classList.add('hidden'), 1500));
    window.adminLogin = () => { if (prompt("Heslo:") === "Acsparta333") document.getElementById("adminPanel").style.display = "block"; };

    // HRÁČI MODERACE
    window.addExtraPoints = (id, name) => {
        let val = prompt(`Přidat/odebrat body hráči ${name}:`, "0");
        if(val !== null) set(ref(db, `points/${id}`), (points[id] || 0) + parseInt(val));
    };
    window.clearPlayerPoints = (id, name) => { if(confirm(`Vynulovat body hráči ${name}?`)) set(ref(db, `points/${id}`), 0); };
    window.deletePlayerTips = (id, name) => { if(confirm(`Smazat všechny tipy hráči ${name}?`)) remove(ref(db, `tips/${id}/tips`)); };
    window.fullDeletePlayer = (id, name) => { if(confirm(`Smazat hráče ${name} z databáze?`)) { remove(ref(db, `tips/${id}`)); remove(ref(db, `points/${id}`)); }};

    // ZÁPASY MODERACE
    window.addMatch = () => {
        const id = Date.now();
        set(ref(db, `matches/${id}`), { home:"Tým 1", away:"Tým 2", date:"12.3. 18:00", desc:"Zápas", phase: "planned", live: "0:0 (T1)", result: "-", closed: false });
    };
    window.updateMatch = (id, field, val) => update(ref(db, `matches/${id}`), { [field]: val });
    window.deleteMatch = (id) => { if(confirm("Definitivně smazat tento zápas?")) remove(ref(db, `matches/${id}`)); };
    window.clearAllData = () => { if(confirm("VAROVÁNÍ: Smazat úplně všechna data?")) remove(ref(db, "/")); };

    window.handlePhase = (id, phase) => {
        if (phase === 'planned') update(ref(db, `matches/${id}`), { phase: 'live', closed: true });
        else if (phase === 'live') {
            let res = prompt("Konečný výsledek (např. 2:0):");
            if (res) update(ref(db, `matches/${id}`), { phase: 'ended', result: res, live: "" });
        } else if (phase === 'ended') {
            if(confirm("Přesunout do archivu?")) update(ref(db, `matches/${id}`), { phase: 'archived' });
        }
    };

    window.toggleArchive = () => { const s = document.getElementById("archiveSection"); s.style.display = s.style.display === "block" ? "none" : "block"; };
    window.changeName = () => { let n = prompt("Tvé jméno:"); if(n) { localStorage.setItem("pName", n.trim()); set(ref(db, `tips/${pId}/name`), n.trim()); }};
    
    window.sendTip = (id) => {
        let n = localStorage.getItem("pName") || prompt("Tvé jméno:");
        if(!n) return; localStorage.setItem("pName", n);
        let t = prompt("Tvůj tip (např. 2:1):");
        if(t && t.includes(":")) { set(ref(db, `tips/${pId}/name`), n); set(ref(db, `tips/${pId}/tips/${id}`), t); }
    };

    onValue(ref(db, "/"), snap => {
        const d = snap.val() || {};
        matches = d.matches || {}; tips = d.tips || {}; points = d.points || {};
        const mDiv = document.getElementById("matches");
        const arcList = document.getElementById("archiveList");
        const adMatches = document.getElementById("adminMatches");
        const adPlayers = document.getElementById("adminPlayers");
        const adArchive = document.getElementById("adminArchive");
        
        mDiv.innerHTML = ""; arcList.innerHTML = ""; adMatches.innerHTML = ""; adPlayers.innerHTML = ""; adArchive.innerHTML = "";

        // Admin Hráči
        Object.keys(tips).forEach(id => {
            const name = tips[id].name || "Neznámý";
            adPlayers.innerHTML += `<div class="player-item"><span><b>${name}</b> (${points[id]||0} b.)</span><div style="display:flex; gap:5px; flex-wrap:wrap;"><button onclick="window.addExtraPoints('${id}','${name}')" style="background:#0ea5e9; font-size:11px; padding:5px 10px;">+/- Body</button><button onclick="window.clearPlayerPoints('${id}','${name}')" style="background:#f59e0b; font-size:11px; padding:5px 10px;">Reset body</button><button onclick="window.deletePlayerTips('${id}','${name}')" class="danger" style="font-size:11px; padding:5px 10px;">Smazat tipy</button><button onclick="window.fullDeletePlayer('${id}','${name}')" class="danger" style="font-size:11px; padding:5px 10px; background:#450a0a !important;">Smazat hráče</button></div></div>`;
        });

        // Zápasy & Archiv
        Object.keys(matches).sort().reverse().forEach(id => {
            const m = matches[id];
            const dateOnly = m.date ? m.date.split(" ")[0] : "";
            
            if (m.phase !== 'archived') {
                let st = m.phase==='live' ? "Zápas probíhá..." : (m.phase==='ended' ? "Zápas skončil" : m.date);
                const hasTipped = tips[pId] && tips[pId].tips && tips[pId].tips[id];
                const btnLabel = hasTipped ? "Upravit tip" : "Tipovat";

                mDiv.innerHTML += `
                    <div class="match">
                        ${m.phase === 'live' ? '<span class="live-badge">LIVE</span>' : ''}
                        <span class="match-info">${m.desc}</span>
                        <span class="match-status">${st}</span>
                        <h2>${m.home} - ${m.away}</h2>
                        ${m.phase !== 'planned' ? `<p>${m.phase==='live'?'Aktuální stav':'Výsledek'}: <b>${m.phase==='live'?m.live:m.result}</b></p>` : ''}
                        <button onclick="window.sendTip('${id}')" ${m.closed ? 'disabled' : ''}>
                            ${m.closed ? 'Zavřeno' : btnLabel}
                        </button>
                    </div>`;
                
                let btnTxt = m.phase==='planned' ? "Začít zápas" : (m.phase==='live' ? "Ukončit zápas" : "Archivovat");
                adMatches.innerHTML += `<div class="admin-item"><input onchange="window.updateMatch('${id}','desc',this.value)" value="${m.desc}"><input onchange="window.updateMatch('${id}','date',this.value)" value="${m.date}"><div style="display:flex; gap:2px;"><input style="width:45%" onchange="window.updateMatch('${id}','home',this.value)" value="${m.home}"><input style="width:45%" onchange="window.updateMatch('${id}','away',this.value)" value="${m.away}"></div>${m.phase === 'live' ? `<input placeholder="Live stav" onchange="window.updateMatch('${id}','live',this.value)" value="${m.live}">` : ''}<div style="margin-top:10px; display:flex; gap:5px; justify-content:center;"><button class="success" onclick="window.handlePhase('${id}','${m.phase}')">${btnTxt}</button><button class="btn-alt" onclick="window.updateMatch('${id}','closed',${!m.closed})">${m.closed?'Otevřít tipy':'Zavřít tipy'}</button><button class="danger" onclick="window.deleteMatch('${id}')">Smazat</button></div></div>`;
            } else {
                // OPRAVA: Tady se teď zobrazuje datum i v archivu
                arcList.innerHTML += `<div class="archive-row"><span>${m.home} vs ${m.away} <small class="archive-date">(${dateOnly})</small></span> <b>${m.result}</b></div>`;
                adArchive.innerHTML += `<div class="archive-manage-item"><span><b>${m.home} - ${m.away}</b> (${dateOnly}, ${m.result})</span><button class="danger" onclick="window.deleteMatch('${id}')" style="font-size:11px; padding:5px 10px;">Smazat</button></div>`;
            }
        });
        renderTable();
    });

    function renderTable() {
        const table = document.getElementById("playersTable");
        let sortedIds = Object.keys(tips).sort((a,b) => (points[b]||0) - (points[a]||0));
        let activeMatches = Object.keys(matches).filter(id => matches[id].phase !== 'archived');
        
        let headerHtml = "<thead><tr><th>Hráč</th><th>Body</th>";
        activeMatches.forEach(mid => {
            const m = matches[mid];
            const hName = (m.home || "T1").trim().substring(0, 3);
            const aName = (m.away || "T2").trim().substring(0, 3);
            const dateOnly = m.date ? m.date.split(" ")[0] : "";
            headerHtml += `<th>${hName} vs ${aName}<br><span style="font-size:10px; color:#94a3b8; font-weight:normal;">${dateOnly}</span></th>`;
        });
        headerHtml += "</tr></thead>";

        let bodyHtml = "<tbody>";
        sortedIds.forEach(pid => {
            bodyHtml += `<tr class="${pid===pId?'my-row':''}">
                <td data-label="Hráč"><b>${tips[pid].name}</b></td>
                <td data-label="Body"><b>${points[pid]||0}</b></td>`;
            
            activeMatches.forEach(mid => {
                const m = matches[mid];
                const hName = (m.home || "T1").trim().substring(0, 3);
                const aName = (m.away || "T2").trim().substring(0, 3);
                const dateOnly = m.date ? m.date.split(" ")[0] : "";
                let t = tips[pid].tips?.[mid] || "-";
                let cls = "", score = (m.phase === 'live' ? m.live : (m.result !== "-" ? m.result : null));
                if(score && score.includes(":") && t !== "-") {
                    let cleanRes = score.split(" ")[0];
                    let [rh, ra] = cleanRes.split(":").map(Number), [th, ta] = t.split(":").map(Number);
                    if(rh===th && ra===ta) cls = "tip-exact";
                    else if((rh>ra && th>ta) || (rh<ra && th<ta) || (rh===ra && th===ta)) cls = "tip-tendency";
                }
                bodyHtml += `<td data-label="${hName}-${aName} (${dateOnly})" class="${cls}">${t}</td>`;
            });
            bodyHtml += "</tr>";
        });
        table.innerHTML = headerHtml + bodyHtml + "</tbody>";
    }
</script>
</body>
</html>
