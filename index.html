<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipovačka</title>
    <style>
        body{font-family:Arial, sans-serif;background:#0f172a;color:white;text-align:center;margin:0;padding:10px;}
        h1{color: #3b82f6; margin-bottom: 20px;}
        .match{background:#1e293b;padding:20px;margin:15px auto;border-radius:12px;max-width:500px;border: 1px solid #334155;}
        button{padding:12px 18px;border:none;border-radius:8px;background:#3b82f6;color:white;cursor:pointer;margin:5px;font-weight:bold;}
        button:hover{background:#2563eb;}
        button:disabled{background:#475569 !important; cursor:not-allowed; opacity:0.6;}
        .admin{background:#111827;padding:20px;display:none;border-radius:10px;max-width:750px;margin:40px auto;border:2px dashed #ef4444;}
        .admin-item{background:#1e293b; margin-bottom:10px; padding:15px; border-radius:8px; border:1px solid #444; display:flex; flex-wrap:wrap; justify-content:center; align-items:center; gap:10px;}
        input{padding:8px;border-radius:6px;background:#0f172a;color:white;border:1px solid #475569;}
        table{margin:20px auto;border-collapse:collapse;width:95%;max-width:1000px;background:#1e293b; font-size: 14px;}
        td,th{border:1px solid #334155;padding:10px;text-align:center;}
        th{background:#334155; color: #94a3b8;}
        .winner-cell{color:#fbbf24; font-weight:bold;}
        .danger{background:#991b1b !important;}
        .danger:hover{background:#7f1d1d !important;}
    </style>
</head>
<body>

    <h1>Tipovačka</h1>
    <button onclick="window.adminLogin()">Admin sekce</button>

    <div id="matches">Nacitany zapasy...</div>

    <h2>Tabulka vysledku</h2>
    <div style="overflow-x:auto;">
        <table id="playersTable"></table>
    </div>

    <div class="admin" id="adminPanel">
        <h2>Admin Panel</h2>
        <button onclick="document.getElementById('adminPanel').style.display='none'" style="background:#475569">Zavrit</button>
        <button onclick="window.addMatch()" style="background:#059669">Pridat zapas</button>
        <button onclick="window.recalcPoints()" style="background:#8b5cf6">Prepocitat body</button>
        <div style="margin-top:10px;">
            <button onclick="window.clearAllTips()" class="danger">Smazat vsechny tipy</button>
            <button onclick="window.clearAllPoints()" class="danger">Vynulovat body</button>
        </div>
        <hr style="border:0; border-top:1px solid #334155; margin:20px 0;">
        <div id="adminMatches"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC2xPE4YnIanTiRgrwsoXgoclTyOq0BraE",
        authDomain: "tipovacka-fce0e.firebaseapp.com",
        databaseURL: "https://tipovacka-fce0e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "tipovacka-fce0e",
        storageBucket: "tipovacka-fce0e.firebasestorage.app",
        messagingSenderId: "165273430060",
        appId: "1:165273430060:web:a6a6ba6952152855230989"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const ADMIN_HESLO = "Acsparta333";
    let matches = [], tips = {}, points = {}, pId = localStorage.getItem("pId") || "p"+Math.random().toString(16).slice(2);
    localStorage.setItem("pId", pId);

    // FUNKCE PRO OKNO
    window.adminLogin = () => {
        let p = prompt("Zadej heslo:");
        if (p === ADMIN_HESLO) document.getElementById("adminPanel").style.display = "block";
    };

    window.addMatch = () => {
        const i = matches.length;
        set(ref(db, `matches/${i}`), {home:"Tým A", away:"Tým B", closed:false, result:"-"});
    };

    window.updateTeam = (i, side, val) => set(ref(db, `matches/${i}/${side}`), val);
    
    window.toggleMatch = (i, state) => set(ref(db, `matches/${i}/closed`), state);

    window.setRes = (i) => {
        let r = prompt("Konecny vysledek (napr. 3:1):");
        if(r) { update(ref(db, `matches/${i}`), {result: r, closed: true}); window.recalcPoints(); }
    };

    window.delMatch = (i) => { if(confirm("Opravdu smazat?")) remove(ref(db, `matches/${i}`)); };
    window.clearAllTips = () => { if(confirm("Smazat VSECHNY tipy hracu?")) remove(ref(db, "tips")); };
    window.clearAllPoints = () => { if(confirm("Smazat vsem body?")) remove(ref(db, "points")); };

    window.sendTip = (i) => {
        let n = localStorage.getItem("pName") || prompt("Tvoje jmeno:");
        if(!n) return; localStorage.setItem("pName", n);
        let t = prompt("Tvuj tip (napr. 2:1):", tips[pId]?.tips?.[i] || "");
        if(t && t.includes(":")) {
            set(ref(db, `tips/${pId}/name`), n);
            set(ref(db, `tips/${pId}/tips/${i}`), t);
        }
    };

    window.recalcPoints = () => {
        let p = {};
        for (let id in tips) {
            let total = 0;
            matches.forEach((m, i) => {
                if(m?.result && m.result !== "-" && tips[id].tips?.[i]) {
                    let [rh, ra] = m.result.split(":").map(Number);
                    let [th, ta] = tips[id].tips[i].split(":").map(Number);
                    if(rh === th && ra === ta) total += 3;
                    else if((rh > ra && th > ta) || (rh < ra && th < ta) || (rh === ra && th === ta)) total += 1;
                }
            });
            p[id] = total;
        }
        set(ref(db, "points"), p);
    };

    // NACITANI DAT A RENDER
    onValue(ref(db, "/"), snap => {
        const d = snap.val() || {};
        matches = d.matches || [];
        tips = d.tips || {};
        points = d.points || {};
        
        // Zápasy
        const div = document.getElementById("matches");
        div.innerHTML = "";
        matches.forEach((m, i) => {
            if(!m) return;
            div.innerHTML += `
                <div class="match">
                    <h2>${m.home} - ${m.away}</h2>
                    <p>Vysledek: <b>${m.result || "-:-"}</b></p>
                    <button onclick="window.sendTip(${i})" ${m.closed ? 'disabled' : ''}>
                        ${m.closed ? 'Zavreno' : (tips[pId]?.tips?.[i] ? 'Upravit tip' : 'Tipovat')}
                    </button>
                </div>`;
        });

        // Tabulka s tipy
        let tableHtml = "<tr><th>Hrac</th><th>Body</th>";
        matches.forEach((m, i) => { if(m) tableHtml += `<th>Z${i+1}</th>`; });
        tableHtml += "</tr>";

        let sorted = Object.keys(tips).sort((a,b)=>(points[b]||0)-(points[a]||0));
        sorted.forEach(id => {
            tableHtml += `<tr><td><b>${tips[id].name}</b></td><td class="winner-cell">${points[id]||0}</td>`;
            matches.forEach((m, i) => {
                if(m) {
                    let playerTip = (tips[id].tips && tips[id].tips[i]) ? tips[id].tips[i] : "-";
                    tableHtml += `<td>${playerTip}</td>`;
                }
            });
            tableHtml += "</tr>";
        });
        document.getElementById("playersTable").innerHTML = tableHtml;

        // Admin sekce
        const ad = document.getElementById("adminMatches");
        ad.innerHTML = "";
        matches.forEach((m, i) => {
            if(!m) return;
            ad.innerHTML += `
                <div class="admin-item">
                    <input oninput="window.updateTeam(${i},'home',this.value)" value="${m.home}" style="width:80px"> vs 
                    <input oninput="window.updateTeam(${i},'away',this.value)" value="${m.away}" style="width:80px">
                    <button onclick="window.setRes(${i})" style="background:#10b981">Vysledek</button>
                    <button onclick="window.toggleMatch(${i}, ${!m.closed})" style="background:#6366f1">
                        ${m.closed ? 'Otevrit' : 'Zavrit'}
                    </button>
                    <button onclick="window.delMatch(${i})" class="danger">Smazat</button>
                </div>`;
        });
    });
</script>
</body>
</html>
