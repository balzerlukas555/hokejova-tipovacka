<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipovačka</title>
    <style>
        body{font-family:Arial, sans-serif;background:#0f172a;color:white;text-align:center;margin:0;padding:10px;}
        h1{color: #3b82f6; margin-bottom: 20px;}
        .match{background:#1e293b;padding:20px;margin:15px auto;border-radius:12px;max-width:500px;border: 1px solid #334155;}
        button{padding:12px 18px;border:none;border-radius:8px;background:#3b82f6;color:white;cursor:pointer;margin:5px;transition:0.2s; font-weight: bold;}
        button:hover{background:#2563eb;}
        button:disabled{background:#475569 !important; cursor: not-allowed; opacity: 0.6;}
        .admin{background:#111827;padding:20px;display:none;border-radius:10px;max-width:750px;margin:40px auto;border: 2px dashed #ef4444;}
        .admin-item{background:#1e293b; margin-bottom:15px; padding:15px; border-radius:8px; border:1px solid #444; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px;}
        input{padding:10px;border-radius:6px;background: #0f172a; color: white; border: 1px solid #475569; font-size: 14px;}
        table{margin:20px auto;border-collapse:collapse;width:95%;max-width:900px;background: #1e293b;}
        td,th{border:1px solid #334155;padding:12px;text-align:center;}
        th{background:#334155; color: #94a3b8; text-transform: uppercase; font-size: 11px;}
        .winner-cell{color:#fbbf24; font-weight:bold;}
        .danger{background:#991b1b !important;}
    </style>
</head>
<body>

    <h1>🏆 Tipovačka</h1>
    <button id="adminLoginBtn">⚙️ Admin sekce</button>

    <div id="matches">Načítám zápasy...</div>

    <h2>📊 Tabulka výsledků</h2>
    <div style="overflow-x:auto;">
        <table id="playersTable"></table>
    </div>

    <div class="admin" id="adminPanel">
        <h2>🛠️ Admin Panel</h2>
        <button id="closeAdminBtn" style="background:#475569">Zavřít</button>
        <button id="addMatchBtn" style="background:#059669">+ Přidat zápas</button>
        <button id="recalcBtn" style="background:#8b5cf6">🔄 Přepočítat body</button>
        <div style="margin-top:10px;">
            <button id="clearTipsBtn" class="danger">🗑️ Smazat všechny tipy</button>
            <button id="clearPointsBtn" class="danger">📉 Vynulovat body</button>
        </div>
        <hr style="border:0; border-top:1px solid #334155; margin:20px 0;">
        <div id="adminMatches"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC2xPE4YnIanTiRgrwsoXgoclTyOq0BraE",
        authDomain: "tipovacka-fce0e.firebaseapp.com",
        databaseURL: "https://tipovacka-fce0e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "tipovacka-fce0e",
        storageBucket: "tipovacka-fce0e.firebasestorage.app",
        messagingSenderId: "165273430060",
        appId: "1:165273430060:web:a6a6ba6952152855230989"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const ADMIN_HESLO = "Acsparta333";
    let matches = [], tips = {}, points = {};
    let pId = localStorage.getItem("pId") || "p" + Math.random().toString(16).slice(2);
    localStorage.setItem("pId", pId);

    // --- PŘIPOJENÍ TLAČÍTEK ---
    document.getElementById("adminLoginBtn").onclick = () => {
        let p = prompt("Zadej heslo:");
        if (p === ADMIN_HESLO) document.getElementById("adminPanel").style.display = "block";
        else if (p !== null) alert("Chyba!");
    };
    document.getElementById("closeAdminBtn").onclick = () => document.getElementById("adminPanel").style.display = "none";
    document.getElementById("addMatchBtn").onclick = () => {
        const newIdx = matches.length;
        set(ref(db, `matches/${newIdx}`), {home:"Tým A", away:"Tým B", closed:false, result:"-"});
    };
    document.getElementById("recalcBtn").onclick = () => recalcPoints();
    document.getElementById("clearTipsBtn").onclick = () => { if(confirm("Smazat VŠECHNY tipy?")) remove(ref(db, "tips")); };
    document.getElementById("clearPointsBtn").onclick = () => { if(confirm("Vynulovat body?")) remove(ref(db, "points")); };

    // --- DATA ---
    onValue(ref(db, "/"), snap => {
        const d = snap.val() || {};
        matches = d.matches || [];
        tips = d.tips || {};
        points = d.points || {};
        render();
    });

    function render() {
        const div = document.getElementById("matches");
        div.innerHTML = "";
        matches.forEach((m, i) => {
            if(!m) return;
            const hasTipped = tips[pId]?.tips?.[i];
            const mDiv = document.createElement("div");
            mDiv.className = "match";
            mDiv.innerHTML = `
                <h2>${m.home} — ${m.away}</h2>
                <p>Výsledek: <b>${m.result || "- : -"}</b></p>
            `;
            const btn = document.createElement("button");
            btn.disabled = m.closed;
            btn.innerText = m.closed ? '🔒 Uzavřeno' : (hasTipped ? '📝 Upravit tip' : '🏒 Tipovat');
            btn.onclick = () => sendTip(i);
            mDiv.appendChild(btn);
            div.appendChild(mDiv);
        });
        renderTable();
        renderAdmin();
    }

    function sendTip(i) {
        let n = localStorage.getItem("pName") || prompt("Tvoje jméno:");
        if(!n) return;
        localStorage.setItem("pName", n);
        let currentTip = tips[pId]?.tips?.[i] || "";
        let t = prompt(`${matches[i].home} vs ${matches[i].away}\nTip (např. 3:2):`, currentTip);
        if(t && t.includes(":")) {
            set(ref(db, `tips/${pId}/name`), n);
            set(ref(db, `tips/${pId}/tips/${i}`), t);
        }
    }

    function renderTable() {
        let h = "<tr><th>Hráč</th><th style='color:#fbbf24;'>Body</th>";
        matches.forEach((m, i) => { if(m) h += `<th>Z${i+1}</th>`; });
        h += "</tr>";
        let sorted = Object.keys(tips).sort((a,b) => (points[b]||0) - (points[a]||0));
        sorted.forEach(id => {
            h += `<tr><td><b>${tips[id].name}</b></td><td class="winner-cell">${points[id]||0}</td>`;
            matches.forEach((m, i) => { if(m) h += `<td>${tips[id].tips?.[i] || "-"}</td>`; });
            h += "</tr>";
        });
        document.getElementById("playersTable").innerHTML = h;
    }

    function renderAdmin() {
        const ad = document.getElementById("adminMatches");
        if (document.getElementById("adminPanel").style.display !== "block") return;
        ad.innerHTML = "";
        matches.forEach((m, i) => {
            if(!m) return;
            const row = document.createElement("div");
            row.className = "admin-item";
            row.innerHTML = `
                <input type="text" value="${m.home}" class="h-in"> vs 
                <input type="text" value="${m.away}" class="a-in">
            `;
            
            const resBtn = document.createElement("button");
            resBtn.innerText = "Výsledek";
            resBtn.style.background = "#10b981";
            resBtn.onclick = () => {
                let r = prompt("Výsledek:", "2:1");
                if(r) { update(ref(db, `matches/${i}`), {result: r, closed: true}); recalcPoints(); }
            };

            const toggleBtn = document.createElement("button");
            toggleBtn.innerText = m.closed ? '🔓 Otevřít' : '🔒 Zavřít';
            toggleBtn.style.background = "#6366f1";
            toggleBtn.onclick = () => set(ref(db, `matches/${i}/closed`), !m.closed);

            const delBtn = document.createElement("button");
            delBtn.innerText = "🗑️";
            delBtn.className = "danger";
            delBtn.onclick = () => { if(confirm("Smazat?")) remove(ref(db, `matches/${i}`)); };

            row.querySelectorAll(".h-in")[0].oninput = (e) => set(ref(db, `matches/${i}/home`), e.target.value);
            row.querySelectorAll(".a-in")[0].oninput = (e) => set(ref(db, `matches/${i}/away`), e.target.value);

            row.appendChild(resBtn);
            row.appendChild(toggleBtn);
            row.appendChild(delBtn);
            ad.appendChild(row);
        });
    }

    function recalcPoints() {
        let p = {};
        for (let id in tips) {
            let total = 0;
            matches.forEach((m, i) => {
                if(m?.result && m.result !== "-" && tips[id].tips?.[i]) {
                    let [rh, ra] = m.result.split(":").map(Number);
                    let [th, ta] = tips[id].tips[i].split(":").map(Number);
                    if(rh === th && ra === ta) total += 3;
                    else if((rh > ra && th > ta) || (rh < ra && th < ta) || (rh === ra && th === ta)) total += 1;
                }
            });
            p[id] = total;
        }
        set(ref(db, "points"), p);
    }
</script>
</body>
</html>
