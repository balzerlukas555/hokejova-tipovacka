<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipovačka Pro</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/4242/4242098.png" type="image/png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4242/4242098.png">
    <style>
        #intro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.8s ease-out, visibility 0.8s;
        }
        #intro.hidden { opacity: 0; visibility: hidden; }
        .logo-main { 
            width: 120px; 
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.6)) brightness(1.2);
            object-fit: contain;
        }
        #intro img { animation: pulse 1.5s ease-in-out forwards; }
        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        #pwaModal {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70%;
            background: #1e293b; border-top: 3px solid #3b82f6;
            z-index: 10000; display: none; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
            box-sizing: border-box; text-align: center;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            border-radius: 20px 20px 0 0;
        }
        .pwa-icon { width: 60px; margin-bottom: 15px; }
        .pwa-step { display: flex; align-items: center; gap: 10px; margin: 10px 0; font-size: 16px; text-align: left; width: 100%; max-width: 300px; }
        .pwa-btn { background: #059669; margin-top: 20px; width: 100%; max-width: 300px; }

        body { font-family: Arial, sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding: 10px; line-height: 1.5; }
        h1 { color: #3b82f6; margin: 15px 0 20px 0; font-size: 28px; }
        h2 { font-size: 22px; margin-top: 30px; }
        .menu-bar { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        
        #matches { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .match { background: #1e293b; padding: 20px; border-radius: 12px; width: 100%; max-width: 450px; border: 1px solid #334155; box-sizing: border-box; position: relative; }
        .live-badge { position: absolute; top: 10px; right: 10px; background: #991b1b; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; animation: blink 1.5s infinite; }
        
        .match-info { color: #94a3b8; font-size: 13px; margin-bottom: 2px; display: block; }
        .match-date { color: #3b82f6; font-size: 14px; font-weight: bold; margin-bottom: 8px; display: block; }
        
        button { padding: 12px 18px; border: none; border-radius: 8px; background: #3b82f6; color: white; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; touch-action: manipulation; }
        button:active { transform: scale(0.96); }
        button:disabled { background: #475569 !important; cursor: not-allowed; opacity: 0.6; }
        .btn-alt { background: #475569; }
        .danger { background: #991b1b !important; }
        
        .admin { background: #111827; padding: 15px; display: none; border-radius: 12px; max-width: 650px; margin: 30px auto; border: 2px dashed #ef4444; box-sizing: border-box; }
        .admin-item { background: #1e293b; margin-bottom: 12px; padding: 15px; border-radius: 8px; border: 1px solid #444; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .player-manage-item { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; border: 1px solid #334155; }

        .tableWrap { width: 100%; max-width: 1000px; margin: 20px auto; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 10px; overflow: hidden; }
        .my-row { border: 2px solid #3b82f6 !important; background: #1e294b !important; }
        
        input { padding: 10px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #475569; }
        .input-wide { width: 220px; }

        @media (max-width: 600px) {
            thead { display: none; }
            tr { display: block; margin-bottom: 15px; border: 1px solid #334155; border-radius: 10px; padding: 10px; background: #1e293b; }
            td { display: flex; justify-content: space-between; padding: 8px 5px; border: none; border-bottom: 1px solid #2d3748; text-align: right; }
            td::before { content: attr(data-label); font-weight: bold; text-align: left; color: #94a3b8; }
        }
    </style>
</head>
<body>

    <div id="intro">
        <img src="https://cdn-icons-png.flaticon.com/512/4242/4242141.png" class="logo-main" alt="Intro Logo">
    </div>

    <div id="pwaModal">
        <img src="https://cdn-icons-png.flaticon.com/512/4242/4242098.png" class="pwa-icon">
        <h2 style="margin: 0 0 15px 0;">Nainstaluj Tipovačku</h2>
        <div id="pwaInstructions"></div>
        <button onclick="window.closePWA()" class="pwa-btn">Již na ploše mám</button>
    </div>

    <div style="margin-top: 20px;">
        <img src="https://cdn-icons-png.flaticon.com/512/4242/4242141.png" class="logo-main" style="width: 80px;" alt="Main Logo">
    </div>
    <h1>Tipovačka</h1>
    
    <div class="menu-bar">
        <button onclick="window.changeName()" class="btn-alt">Změnit jméno</button>
        <button onclick="window.adminLogin()" class="btn-alt">Admin sekce</button>
    </div>

    <div id="matches">Načítám zápasy...</div>

    <h2>Tabulka výsledků</h2>
    <div class="tableWrap">
        <table id="playersTable"></table>
    </div>

    <div id="adminPanel" class="admin">
        <h2>Admin panel</h2>
        <div style="display:flex; justify-content:center; gap:5px; flex-wrap:wrap;">
            <button onclick="document.getElementById('adminPanel').style.display='none'" style="background:#475569">Zavřít</button>
            <button onclick="window.addMatch()" style="background:#059669">Přidat zápas</button>
        </div>
        <div style="margin-top:20px; display:flex; justify-content:center; gap:10px;">
            <button onclick="window.clearAllTips()" class="danger">Smazat VŠE (Reset databáze)</button>
        </div>
        <hr style="border:0; border-top:1px solid #334155; margin:20px 0;">
        <h3>Správa hráčů</h3>
        <div id="adminPlayers"></div>
        <hr style="border:0; border-top:1px solid #334155; margin:20px 0;">
        <h3>Správa zápasů</h3>
        <div id="adminMatches"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC2xPE4YnIanTiRgrwsoXgoclTyOq0BraE",
        authDomain: "tipovacka-fce0e.firebaseapp.com",
        databaseURL: "https://tipovacka-fce0e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "tipovacka-fce0e",
        storageBucket: "tipovacka-fce0e.firebasestorage.app",
        messagingSenderId: "165273430060",
        appId: "1:165273430060:web:a6a6ba6952152855230989"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const ADMIN_HESLO = "Acsparta333";
    let matches = [], tips = {}, points = {}, pId = localStorage.getItem("pId") || "p"+Math.random().toString(16).slice(2);
    localStorage.setItem("pId", pId);

    window.closePWA = () => { localStorage.setItem("pwaInstalled", "true"); document.getElementById("pwaModal").style.display = "none"; };
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const pwaInstalled = localStorage.getItem("pwaInstalled");

    window.addEventListener('load', () => { 
        setTimeout(() => { 
            document.getElementById('intro').classList.add('hidden'); 
            if (isMobile && !pwaInstalled) {
                document.getElementById("pwaModal").style.display = "flex";
                const instr = document.getElementById("pwaInstructions");
                if (isIOS) {
                    instr.innerHTML = `<div class="pwa-step"><span>1.</span> Klikni na <b>sdílení</b> <img src="https://img.icons8.com/ios/50/ffffff/share-rounded.png" width="20"></div><div class="pwa-step"><span>2.</span> Vyber <b>"Přidat na plochu"</b></div>`;
                } else {
                    instr.innerHTML = `<div class="pwa-step"><span>1.</span> Klikni na <b>tři tečky</b> <img src="https://img.icons8.com/ios/50/ffffff/menu-2.png" width="20"></div><div class="pwa-step"><span>2.</span> Vyber <b>"Instalovat"</b></div>`;
                }
            }
        }, 1500); 
    });

    const formatResult = (res) => {
        if(!res || res === "-") return "-";
        return res.toLowerCase().replace("p", " (PP)").replace("n", " (SN)");
    };

    const isLocked = (m) => {
        if (m.closed === true) return true;
        if (!m.date || !m.date.includes(".")) return false;
        try {
            const [datePart, timePart] = m.date.split(" ");
            const [day, month] = datePart.split(".").map(Number);
            const [hour, min] = timePart.split(":").map(Number);
            const matchDate = new Date(new Date().getFullYear(), month - 1, day, hour, min);
            return new Date() > matchDate;
        } catch(e) { return false; }
    };

    window.changeName = () => {
        let n = prompt("Zadej jméno:", localStorage.getItem("pName") || "");
        if (n) { localStorage.setItem("pName", n.trim()); set(ref(db, `tips/${pId}/name`), n.trim()); }
    };

    window.adminLogin = () => { if (prompt("Heslo:") === ADMIN_HESLO) document.getElementById("adminPanel").style.display = "block"; };
    window.addMatch = () => set(ref(db, `matches/${Date.now()}`), {home:"Domácí", away:"Hosté", date:"", desc:"", result:"-", live: ""});
    window.updateMatchData = (id, field, val) => update(ref(db, `matches/${id}`), {[field]: val});
    window.toggleMatch = (id, state) => update(ref(db, `matches/${id}`), {closed: state});
    window.delMatch = (id) => { if(confirm("Smazat zápas? Body zůstávají.")) remove(ref(db, `matches/${id}`)); };
    
    // FUNKCE SPRÁVY HRÁČŮ
    window.addExtraPoints = async (id, name) => {
        let val = prompt(`Upravit body hráči ${name} (např. 5 nebo -5):`);
        if(val !== null && !isNaN(val)) {
            const current = points[id] || 0;
            await set(ref(db, `points/${id}`), current + parseInt(val));
        }
    };
    window.clearPlayerPoints = (id, name) => { if(confirm(`Vynulovat body hráči ${name}?`)) set(ref(db, `points/${id}`), 0); };
    window.deletePlayerTips = (id, name) => { if(confirm(`Smazat tipy hráči ${name}?`)) remove(ref(db, `tips/${id}/tips`)); };
    window.fullDeletePlayer = (id, name) => { if(confirm(`Smazat úplně hráče ${name}?`)) { remove(ref(db, `tips/${id}`)); remove(ref(db, `points/${id}`)); }};
    window.clearAllTips = () => { if(confirm("Smazat VŠE z databáze?")) { remove(ref(db, "matches")); remove(ref(db, "tips")); remove(ref(db, "points")); }};

    window.setRes = async (id) => {
        let r = prompt("Konečný výsledek (3:1, 2:1p, 3:2n):");
        if(r) { 
            Object.keys(tips).forEach(pid => {
                let userTip = tips[pid].tips?.[id];
                if(userTip) {
                    let ptsToAdd = 0;
                    let cleanR = r.toLowerCase().replace("p","").replace("n","");
                    let cleanT = userTip.toLowerCase().replace("p","").replace("n","");
                    let [rh, ra] = cleanR.split(":").map(Number);
                    let [th, ta] = cleanT.split(":").map(Number);

                    if(r.toLowerCase() === userTip.toLowerCase()) ptsToAdd = 3;
                    else if((rh > ra && th > ta) || (rh < ra && th < ta)) ptsToAdd = 1;
                    
                    if(ptsToAdd > 0) set(ref(db, `points/${pid}`), (points[pid] || 0) + ptsToAdd);
                }
            });
            update(ref(db, `matches/${id}`), {result: r, live: "", closed: true}); 
        }
    };

    window.sendTip = (id) => {
        let n = localStorage.getItem("pName") || prompt("Jméno:");
        if(!n) return; localStorage.setItem("pName", n);
        let t = prompt("Tip (2:1, 2:1p, 2:1n):", tips[pId]?.tips?.[id] || "");
        if(t && t.includes(":")) {
            let cleanT = t.toLowerCase().replace("p","").replace("n","");
            let [th, ta] = cleanT.split(":").map(Number);
            if(th === ta) return alert("Remízy nejsou povoleny!");
            set(ref(db, `tips/${pId}/name`), n); 
            set(ref(db, `tips/${pId}/tips/${id}`), t); 
        }
    };

    onValue(ref(db, "/"), snap => {
        const d = snap.val() || {};
        const mData = d.matches || {};
        matches = Object.keys(mData).map(id => ({id, ...mData[id]}));
        tips = d.tips || {}; points = d.points || {};
        
        const mDiv = document.getElementById("matches");
        mDiv.innerHTML = "";
        matches.forEach((m) => {
            const locked = isLocked(m);
            mDiv.innerHTML += `<div class="match">
                ${m.live ? '<span class="live-badge">Live</span>' : ''}
                <span class="match-info">${m.desc || ""}</span>
                <span class="match-date">${locked ? "Zamčeno" : (m.date || "TBD")}</span>
                <h2>${m.home} - ${m.away}</h2>
                <p>Stav: <b>${formatResult(m.live || m.result)}</b></p>
                <button onclick="window.sendTip('${m.id}')" ${locked ? 'disabled' : ''}>Tipovat</button>
            </div>`;
        });

        let table = document.getElementById("playersTable");
        let sortedIds = Object.keys(tips).sort((a,b)=>(points[b]||0)-(points[a]||0));
        let html = "<thead><tr><th>Hráč</th><th>Body</th>" + matches.map((m,i)=>`<th>Z${i+1}</th>`).join('') + "</tr></thead><tbody>";
        sortedIds.forEach(id => {
            html += `<tr class="${id === pId ? 'my-row' : ''}"><td data-label="Hráč"><b>${tips[id].name}</b></td><td data-label="Body"><b>${points[id]||0}</b></td>`;
            matches.forEach((m) => html += `<td data-label="Tip">${formatResult(tips[id].tips?.[m.id])}</td>`);
            html += "</tr>";
        });
        table.innerHTML = html + "</tbody>";

        const pAdmin = document.getElementById("adminPlayers");
        pAdmin.innerHTML = "";
        sortedIds.forEach(id => {
            const name = tips[id].name || "Neznámý";
            pAdmin.innerHTML += `<div class="player-manage-item">
                <span><b>${name}</b> (${points[id]||0} b.)</span>
                <div style="display:flex; gap:5px; flex-wrap:wrap; justify-content: flex-end;">
                    <button onclick="window.addExtraPoints('${id}', '${name}')" style="background:#0ea5e9; padding:5px 10px; font-size:11px;">Body +/-</button>
                    <button onclick="window.clearPlayerPoints('${id}', '${name}')" style="background:#f59e0b; padding:5px 10px; font-size:11px;">Smazat body</button>
                    <button onclick="window.deletePlayerTips('${id}', '${name}')" class="danger" style="padding:5px 10px; font-size:11px;">Smazat tipy</button>
                    <button onclick="window.fullDeletePlayer('${id}', '${name}')" class="danger" style="padding:5px 10px; font-size:11px; background:#450a0a !important;">Smazat hráče</button>
                </div>
            </div>`;
        });

        const ad = document.getElementById("adminMatches");
        ad.innerHTML = "";
        matches.forEach((m) => {
            ad.innerHTML += `<div class="admin-item">
                <input class="input-wide" onchange="window.updateMatchData('${m.id}','desc',this.value)" value="${m.desc||''}" placeholder="Popis">
                <input class="input-wide" onchange="window.updateMatchData('${m.id}','date',this.value)" value="${m.date||''}" placeholder="12.05. 18:00">
                <div style="display:flex; gap:5px;"><input onchange="window.updateMatchData('${m.id}','home',this.value)" value="${m.home}"> <input onchange="window.updateMatchData('${m.id}','away',this.value)" value="${m.away}"></div>
                <input class="input-wide" onchange="window.updateMatchData('${m.id}','live',this.value)" value="${m.live||''}" placeholder="Live stav">
                <div style="display:flex; gap:5px; flex-wrap:wrap; justify-content:center;">
                    <button onclick="window.setRes('${m.id}')" style="background:#10b981">Ukončit & Bodovat</button>
                    <button onclick="window.toggleMatch('${m.id}', true)" style="background:#991b1b">Zavřít</button>
                    <button onclick="window.toggleMatch('${m.id}', false)" style="background:#059669">Otevřít</button>
                    <button onclick="window.delMatch('${m.id}')" class="danger">Smazat</button>
                </div>
            </div>`;
        });
    });
</script>
</body>
</html>
