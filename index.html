<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipovačka Pro</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/9391/9391402.png" type="image/png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/9391/9391402.png">
    <style>
        body{font-family:Arial, sans-serif;background:#0f172a;color:white;text-align:center;margin:0;padding:10px;line-height:1.5;}
        h1{color: #3b82f6; margin: 5px 0 20px 0; font-size: 28px;}
        h2{font-size: 22px; margin-top: 30px;}
        .menu-bar { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        #matches {display: flex; flex-direction: column; align-items: center; gap: 15px;}
        .match{background:#1e293b;padding:20px;border-radius:12px;width:100%;max-width:450px;border: 1px solid #334155; box-sizing: border-box;}
        .match-info { color: #94a3b8; font-size: 13px; margin-bottom: 2px; display: block; }
        .match-date { color: #3b82f6; font-size: 14px; font-weight: bold; margin-bottom: 8px; display: block; }
        button{padding:12px 18px;border:none;border-radius:8px;background:#3b82f6;color:white;cursor:pointer;font-weight:bold;font-size:14px; transition:0.2s; touch-action: manipulation;}
        button:active{transform: scale(0.96);}
        button:disabled{background:#475569 !important; cursor:not-allowed; opacity:0.6;}
        .btn-alt { background: #475569; }
        .danger{background:#991b1b !important;}
        .admin{background:#111827;padding:15px;display:none;border-radius:12px;max-width:600px;margin:30px auto;border:2px dashed #ef4444; box-sizing: border-box;}
        .admin-item{background:#1e293b; margin-bottom:12px; padding:15px; border-radius:8px; border:1px solid #444; display:flex; flex-direction: column; gap: 10px; align-items: center;}
        
        #installGuide { display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#3b82f6; color:white; padding:15px; border-radius:15px; width:90%; max-width:400px; z-index:2000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .guide-close { position:absolute; top:5px; right:10px; font-weight:bold; cursor:pointer; }

        .player-manage-item { background: #1e293b; padding: 15px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .tableWrap { width: 100%; max-width: 1000px; margin: 20px auto; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 10px; overflow: hidden; }
        .tip-exact { background: #065f46 !important; color: #6ee7b7 !important; font-weight: bold; }
        .tip-tendency { background: #854d0e !important; color: #fde047 !important; }
        .my-row { border: 2px solid #3b82f6 !important; background: #1e294b !important; }
        input{padding:10px;border-radius:8px;background:#0f172a;color:white;border:1px solid #475569;}
        .input-wide { width: 220px; }

        @media (max-width: 600px) {
            thead { display: none; }
            tr { display: block; margin-bottom: 15px; border: 1px solid #334155; border-radius: 10px; padding: 10px; background: #1e293b; }
            td { display: flex; justify-content: space-between; padding: 8px 5px; border: none; border-bottom: 1px solid #2d3748; text-align: right; }
            td::before { content: attr(data-label); font-weight: bold; text-align: left; color: #94a3b8; }
        }
    </style>
</head>
<body>

    <div id="installGuide">
        <span class="guide-close" onclick="this.parentElement.style.display='none'">×</span>
        <strong>Pridat Tipovacku na plochu</strong><br>
        <small>iPhone: Sdilat -> Pridat na plochu.</small><br>
        <small>Android: Menu -> Instalovat aplikaci.</small>
    </div>

    <div style="margin-top: 20px;">
        <img src="https://cdn-icons-png.flaticon.com/512/9391/9391402.png" width="80" style="filter: drop-shadow(0 0 10px #3b82f6);">
    </div>
    <h1>Tipovacka</h1>
    
    <div class="menu-bar">
        <button onclick="window.changeName()" class="btn-alt">Zmenit jmeno</button>
        <button onclick="window.adminLogin()" class="btn-alt">Admin sekce</button>
    </div>

    <div id="matches">Nacitam zapasy...</div>

    <h2>Tabulka vysledku</h2>
    <div class="tableWrap">
        <table id="playersTable"></table>
    </div>

    <div id="adminPanel" class="admin">
        <h2>Admin Panel</h2>
        <div style="display:flex; justify-content:center; gap:5px; flex-wrap:wrap;">
            <button onclick="document.getElementById('adminPanel').style.display='none'" style="background:#475569">Zavrit</button>
            <button onclick="window.addMatch()" style="background:#059669">Pridat zapas</button>
            <button onclick="window.recalcPoints()" style="background:#8b5cf6">Prepocitat body</button>
        </div>
        
        <div style="margin-top:20px; display:flex; justify-content:center; gap:10px;">
            <button onclick="window.clearAllTips()" class="danger">Smazat vse (Tipy + Zapasy)</button>
            <button onclick="window.clearAllPoints()" class="danger">Vynulovat vse (Body)</button>
        </div>

        <hr style="border:0; border-top:1px solid #334155; margin:20px 0;">
        <h3>Sprava hracu</h3>
        <div id="adminPlayers"></div>

        <hr style="border:0; border-top:1px solid #334155; margin:20px 0;">
        <h3>Sprava zapasu</h3>
        <div id="adminMatches"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC2xPE4YnIanTiRgrwsoXgoclTyOq0BraE",
        authDomain: "tipovacka-fce0e.firebaseapp.com",
        databaseURL: "https://tipovacka-fce0e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "tipovacka-fce0e",
        storageBucket: "tipovacka-fce0e.firebasestorage.app",
        messagingSenderId: "165273430060",
        appId: "1:165273430060:web:a6a6ba6952152855230989"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const ADMIN_HESLO = "Acsparta333";
    let matches = [], tips = {}, points = {}, pId = localStorage.getItem("pId") || "p"+Math.random().toString(16).slice(2);
    localStorage.setItem("pId", pId);

    if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent) && !window.matchMedia('(display-mode: standalone)').matches) {
        if (!localStorage.getItem("guideHidden")) { document.getElementById("installGuide").style.display = "block"; }
    }

    const isLocked = (m) => {
        if (m.closed === false) return false;
        if (m.closed === true) return true;
        if (!m.date || !m.date.includes(".")) return false;
        try {
            const [datePart, timePart] = m.date.split(" ");
            const [day, month] = datePart.split(".").map(Number);
            const [hour, min] = timePart.split(":").map(Number);
            const matchDate = new Date(new Date().getFullYear(), month - 1, day, hour, min);
            return new Date() > matchDate;
        } catch(e) { return false; }
    };

    window.changeName = () => {
        let n = prompt("Zadej jmeno:", localStorage.getItem("pName") || "");
        if (n) { localStorage.setItem("pName", n.trim()); set(ref(db, `tips/${pId}/name`), n.trim()); }
    };

    window.adminLogin = () => { if (prompt("Heslo:") === ADMIN_HESLO) document.getElementById("adminPanel").style.display = "block"; };
    
    window.addMatch = () => set(ref(db, `matches/${matches.length}`), {home:"Domaci", away:"Hoste", date:"", desc:"", closed: null, result:"-"});
    window.updateMatchData = (i, field, val) => update(ref(db, `matches/${i}`), {[field]: val});
    window.toggleMatch = (i, state) => update(ref(db, `matches/${i}`), {closed: state});
    window.delMatch = (i) => { if(confirm("Smazat tento zapas?")) remove(ref(db, `matches/${i}`)); };
    
    window.deletePlayerTips = (id, name) => { if(confirm(`Smazat tipy hraci ${name}?`)) remove(ref(db, `tips/${id}/tips`)); };
    window.deletePlayerPoints = (id, name) => { if(confirm(`Vynulovat body hraci ${name}?`)) remove(ref(db, `points/${id}`)); };
    window.fullDeletePlayer = (id, name) => { if(confirm(`Kompletne smazat hrace ${name} z tabulky?`)) { remove(ref(db, `tips/${id}`)); remove(ref(db, `points/${id}`)); } };

    window.setRes = (i) => {
        let r = prompt("Vysledek (napr. 3:1):");
        if(r) { update(ref(db, `matches/${i}`), {result: r, closed: true}); window.recalcPoints(); }
    };

    window.clearAllTips = () => { if(confirm("Smazat vse (Tipy i Zapasy)?")) { remove(ref(db, "tips")); remove(ref(db, "matches")); } };
    window.clearAllPoints = () => { if(confirm("Vynulovat body vsem hracum?")) remove(ref(db, "points")); };

    window.sendTip = (i) => {
        let n = localStorage.getItem("pName") || prompt("Jmeno:");
        if(!n) return; localStorage.setItem("pName", n);
        let t = prompt("Tvuj tip (napr. 2:1):", tips[pId]?.tips?.[i] || "");
        if(t && t.includes(":")) { set(ref(db, `tips/${pId}/name`), n); set(ref(db, `tips/${pId}/tips/${i}`), t); }
    };

    window.recalcPoints = () => {
        let p = {};
        Object.keys(tips).forEach(id => {
            let total = 0;
            matches.forEach((m, i) => {
                if(m?.result?.includes(":") && tips[id].tips?.[i]) {
                    let [rh, ra] = m.result.split(":").map(Number), [th, ta] = tips[id].tips[i].split(":").map(Number);
                    if(rh === th && ra === ta) total += 3;
                    else if((rh > ra && th > ta) || (rh < ra && th < ta) || (rh === ra && th === ta)) total += 1;
                }
            });
            p[id] = total;
        });
        set(ref(db, "points"), p);
    };

    onValue(ref(db, "/"), snap => {
        const d = snap.val() || {};
        matches = d.matches ? (Array.isArray(d.matches) ? d.matches : Object.values(d.matches)) : [];
        tips = d.tips || {}; points = d.points || {};
        
        const mDiv = document.getElementById("matches");
        mDiv.innerHTML = "";
        matches.forEach((m, i) => {
            if(!m) return;
            const locked = isLocked(m);
            const userHasTip = tips[pId]?.tips?.[i];
            mDiv.innerHTML += `<div class="match">
                <span class="match-info">${m.desc || ""}</span>
                <span class="match-date">${locked ? "Zamceno" : (m.date || "Termin neurcen")}</span>
                <h2>${m.home} - ${m.away}</h2>
                <p>Vysledek: <b>${m.result || "-:-"}</b></p>
                <button onclick="window.sendTip(${i})" ${locked ? 'disabled' : ''}>
                    ${locked ? 'Zavreno' : (userHasTip ? 'Upravit tip' : 'Tipovat')}
                </button>
            </div>`;
        });

        let table = document.getElementById("playersTable");
        let sortedIds = Object.keys(tips).sort((a,b)=>(points[b]||0)-(points[a]||0));
        let html = "<thead><tr><th>Hrac</th><th>Body</th>" + matches.map((m,i)=>m?`<th>Z${i+1}</th>`:'').join('') + "</tr></thead><tbody>";
        sortedIds.forEach(id => {
            html += `<tr class="${id === pId ? 'my-row' : ''}"><td data-label="Hrac"><b>${tips[id].name || "IDK"}</b></td><td data-label="Body"><b>${points[id]||0}</b></td>`;
            matches.forEach((m, i) => {
                if(!m) return;
                let t = tips[id].tips?.[i] || "-";
                let cls = "";
                if(m.result?.includes(":") && t !== "-") {
                    let [rh, ra] = m.result.split(":").map(Number), [th, ta] = t.split(":").map(Number);
                    if(rh===th && ra===ta) cls = "tip-exact";
                    else if((rh>ra && th>ta) || (rh<ra && th<ta) || (rh===ra && th===ta)) cls = "tip-tendency";
                }
                html += `<td data-label="Z${i+1}" class="${cls}">${t}</td>`;
            });
            html += "</tr>";
        });
        table.innerHTML = html + "</tbody>";

        const pAdmin = document.getElementById("adminPlayers");
        pAdmin.innerHTML = "";
        sortedIds.forEach(id => {
            const name = tips[id].name || "IDK";
            pAdmin.innerHTML += `<div class="player-manage-item">
                <span><b>${name}</b></span>
                <div style="display:flex; gap:5px; flex-wrap:wrap;">
                    <button onclick="window.deletePlayerTips('${id}', '${name}')" class="danger" style="padding:5px 10px; font-size:11px;">Smazat tipy</button>
                    <button onclick="window.deletePlayerPoints('${id}', '${name}')" class="danger" style="padding:5px 10px; font-size:11px;">Smazat body</button>
                    <button onclick="window.fullDeletePlayer('${id}', '${name}')" class="danger" style="padding:5px 10px; font-size:11px; background:#450a0a !important;">Smazat hrace</button>
                </div>
            </div>`;
        });

        const ad = document.getElementById("adminMatches");
        ad.innerHTML = "";
        matches.forEach((m, i) => {
            if(!m) return;
            ad.innerHTML += `<div class="admin-item">
                <input class="input-wide" onchange="window.updateMatchData(${i},'desc',this.value)" value="${m.desc||''}" placeholder="Popis">
                <input class="input-wide" onchange="window.updateMatchData(${i},'date',this.value)" value="${m.date||''}" placeholder="10.03. 18:00">
                <div><input oninput="window.updateMatchData(${i},'home',this.value)" value="${m.home}"> <input oninput="window.updateMatchData(${i},'away',this.value)" value="${m.away}"></div>
                <div style="display:flex; gap:5px; flex-wrap:wrap; justify-content:center;">
                    <button onclick="window.setRes(${i})" style="background:#10b981">Vysledek</button>
                    <button onclick="window.toggleMatch(${i}, false)" style="background:#059669">Otevrit</button>
                    <button onclick="window.toggleMatch(${i}, true)" style="background:#991b1b">Zavrit</button>
                    <button onclick="window.delMatch(${i})" class="danger">Smazat</button>
                </div>
            </div>`;
        });
    });
</script>
</body>
</html>
