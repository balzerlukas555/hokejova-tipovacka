<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportovní Tipovačka</title>
    <style>
        body{font-family:Arial, sans-serif;background:#0f172a;color:white;text-align:center;margin:0;padding:10px;}
        h1{margin-top:10px; color: #3b82f6;}
        .match{background:#1e293b;padding:20px;margin:15px auto;border-radius:12px;max-width:500px;border: 1px solid #334155;}
        .match h2{margin:5px 0 10px 0;}
        button{padding:12px 18px;border:none;border-radius:8px;background:#3b82f6;color:white;cursor:pointer;margin:5px;font-size:14px;transition: 0.3s;}
        button:hover{background:#2563eb;}
        button:disabled{background:#475569; cursor: not-allowed;}
        .admin{background:#111827;padding:20px;margin-top:40px;display:none;border-radius:10px;max-width:700px;margin-left:auto;margin-right:auto;border: 2px dashed #ef4444;}
        input{padding:8px;border-radius:6px;border:1px solid #334155;margin:5px;background: #1e293b; color: white;}
        table{margin:20px auto;border-collapse:collapse;width:95%;max-width:900px;background: #1e293b;}
        td,th{border:1px solid #334155;padding:10px;font-size:14px;}
        th{background: #334155;}
        .tableWrap{overflow-x:auto;}
        @media (max-width:600px){
            .match{padding:15px;}
            button{width:90%;margin-top:8px;}
            td,th{font-size:12px;padding:5px;}
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
</head>
<body>

    <h1>🏒 Hokejová Tipovačka</h1>
    <button onclick="login()">Admin přihlášení</button>

    <div id="matches"></div>

    <h2>Průběžná tabulka</h2>
    <div class="tableWrap">
        <table id="playersTable"></table>
    </div>

    <div class="admin" id="adminPanel">
        <h2>Admin panel</h2>
        <button onclick="logout()" style="background:#ef4444">Odhlásit se</button>
        <br><br>
        <button onclick="addMatch()">+ Přidat nový zápas</button>
        <button onclick="recalculateAllPoints()">🔄 Přepočítat všechny body</button>
        <div id="adminMatches"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // KONFIGURACE FIREBASE (Opravená URL na Europe)
    const firebaseConfig = {
        apiKey: "AIzaSyC2xPE4YnIanTiRgrwsoXgoclTyOq0BraE",
        authDomain: "tipovacka-fce0e.firebaseapp.com",
        databaseURL: "https://tipovacka-fce0e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "tipovacka-fce0e",
        storageBucket: "tipovacka-fce0e.firebasestorage.app",
        messagingSenderId: "165273430060",
        appId: "1:165273430060:web:a6a6ba6952152855230989"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Hash pro heslo: Acsparta333
    const ADMIN_HASH = "81561f7142750e322309ff0903337968";

    let matches = [];
    let tips = {};
    let points = {};

    let playerId = localStorage.getItem("playerId") || "player_" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem("playerId", playerId);
    let playerName = localStorage.getItem("playerName");

    // AUTH FUNKCE
    window.login = function() {
        let pass = prompt("Zadej admin heslo:");
        if (window.md5(pass) === ADMIN_HASH) {
            document.getElementById("adminPanel").style.display = "block";
            window.scrollTo(0, document.body.scrollHeight);
        } else {
            alert("Špatné heslo!");
        }
    };

    window.logout = function() {
        document.getElementById("adminPanel").style.display = "none";
    };

    // NACITANI DAT
    onValue(ref(db, "/"), snap => {
        const data = snap.val() || {};
        matches = data.matches || [];
        tips = data.tips || {};
        points = data.points || {};
        render();
    });

    // RENDER FUNKCE
    function render() {
        const mdiv = document.getElementById("matches");
        mdiv.innerHTML = "";
        
        matches.forEach((m, i) => {
            if(!m) return;
            let div = document.createElement("div");
            div.className = "match";
            div.innerHTML = `
                <h2>${m.home} vs ${m.away}</h2>
                <p>📅 ${m.date ? m.date.replace("T", " ") : "Čas neurčen"}</p>
                <button onclick="tip(${i})" ${m.closed ? "disabled" : ""}>
                    ${m.closed ? "Tipování uzavřeno" : "Tipovat skóre"}
                </button>
                <p><strong>Výsledek: ${m.result || "- : -"}</strong></p>
            `;
            mdiv.appendChild(div);
        });

        renderTable();
        renderAdmin();
    }

    function renderTable() {
        let table = document.getElementById("playersTable");
        let html = "<tr><th>Hráč</th><th>Body celkem</th>";
        matches.forEach(m => { if(m) html += `<th>${m.home.substring(0,3)}-${m.away.substring(0,3)}</th>`; });
        html += "</tr>";

        for (let id in tips) {
            html += `<tr><td><strong>${tips[id].name}</strong></td><td style="color:#fbbf24"><strong>${points[id] || 0} b.</strong></td>`;
            matches.forEach((m, i) => {
                if(!m) return;
                let t = tips[id].tips?.[i] || "-";
                html += `<td>${t}</td>`;
            });
            html += "</tr>";
        }
        table.innerHTML = html;
    }

    // TIPOVÁNÍ
    window.tip = function(id) {
        if (!playerName) {
            playerName = prompt("Tvoje jméno (bude v tabulce):");
            if (!playerName) return;
            localStorage.setItem("playerName", playerName);
        }
        let score = prompt(`${matches[id].home} vs ${matches[id].away}\nZadej svůj tip (např. 3:2):`);
        if (!score || !score.includes(":")) {
            alert("Spatny format! Musi to byt napr. 3:2");
            return;
        }
        
        // Uložení tipu do Firebase
        set(ref(db, `tips/${playerId}/name`), playerName);
        set(ref(db, `tips/${playerId}/tips/${id}`), score);
    };

    // ADMIN FUNKCE
    function renderAdmin() {
        let div = document.getElementById("adminMatches");
        div.innerHTML = "";
        matches.forEach((m, i) => {
            if(!m) return;
            let d = document.createElement("div");
            d.style.borderTop = "1px solid #475569";
            d.style.padding = "10px";
            d.innerHTML = `
                <input value="${m.home}" onchange="updateMatch(${i}, 'home', this.value)"> vs 
                <input value="${m.away}" onchange="updateMatch(${i}, 'away', this.value)">
                <br>
                <input type="datetime-local" value="${m.date || ""}" onchange="updateMatch(${i}, 'date', this.value)">
                <br>
                <button onclick="toggleMatch(${i})">${m.closed ? "🔓 Otevřít" : "🔒 Zavřít"}</button>
                <button onclick="setResult(${i})" style="background:#10b981">Zadat výsledek</button>
                <button onclick="deleteMatch(${i})" style="background:#991b1b">Smazat</button>
            `;
            div.appendChild(d);
        });
    }

    window.updateMatch = function(id, field, val) {
        set(ref(db, `matches/${id}/${field}`), val);
    };

    window.toggleMatch = function(id) {
        set(ref(db, `matches/${id}/closed`), !matches[id].closed);
    };

    window.deleteMatch = function(id) {
        if(confirm("Opravdu smazat zápas?")) {
            matches.splice(id, 1);
            set(ref(db, "matches"), matches);
        }
    };

    window.addMatch = function() {
        const newMatch = { home: "Domácí", away: "Hosté", date: "", result: "-", closed: false };
        if(!matches) matches = [];
        matches.push(newMatch);
        set(ref(db, "matches"), matches);
    };

    window.setResult = function(id) {
        let r = prompt("Konečný výsledek (např. 4:1):");
        if(!r) return;
        set(ref(db, `matches/${id}/result`), r);
        set(ref(db, `matches/${id}/closed`), true);
        recalculateAllPoints(); // Automaticky přepočítat
    };

    // LOGIKA BODOVÁNÍ (3b za přesný výsledek, 1b za vítěze)
    window.recalculateAllPoints = function() {
        let newPoints = {};
        
        for (let pId in tips) {
            let total = 0;
            const playerTips = tips[pId].tips || {};
            
            matches.forEach((m, i) => {
                if (m && m.result && m.result !== "-" && playerTips[i]) {
                    let [rh, ra] = m.result.split(":").map(Number);
                    let [th, ta] = playerTips[i].split(":").map(Number);
                    
                    if (rh === th && ra === ta) {
                        total += 3; // Přesný výsledek
                    } else if ((rh > ra && th > ta) || (rh < ra && th < ta) || (rh === ra && th === ta)) {
                        total += 1; // Jen vítěz / remíza
                    }
                }
            });
            newPoints[pId] = total;
        }
        set(ref(db, "points"), newPoints);
        alert("Body byly přepočítány!");
    };

</script>
</body>
</html>
