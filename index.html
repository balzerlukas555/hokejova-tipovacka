<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipovačka Pro</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4242/4242141.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/4242/4242141.png">
    <meta name="theme-color" content="#0f172a">
    
    <style>
        /* --- INTRO & LOGIN --- */
        #intro { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.8s ease-out; pointer-events: all; }
        #intro.hidden { opacity: 0; pointer-events: none; }
        .logo-intro { width: 120px; }

        #authContainer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 9998; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: #1e293b; padding: 25px; border-radius: 15px; width: 90%; max-width: 350px; border: 1px solid #3b82f6; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }

        /* --- BODY STYLY --- */
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding: 10px; }
        h1 { color: #3b82f6; margin-bottom: 5px; }
        
        .wallet-card { background: #1e294b; border: 2px solid #3b82f6; border-radius: 12px; padding: 15px; margin: 10px auto; max-width: 400px; }
        .balance-val { font-size: 24px; color: #6ee7b7; font-weight: bold; }
        .name-tag { font-size: 14px; color: #94a3b8; margin-bottom: 5px; display: flex; justify-content: center; align-items: center; gap: 10px; }

        /* --- SKUPINY --- */
        .group-container { margin: 20px auto; max-width: 500px; text-align: left; }
        .group-header { background: #1e293b; border-left: 4px solid #3b82f6; padding: 12px; margin-bottom: 5px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; border-radius: 4px; transition: border-color 0.3s; }
        .group-header.finished { border-left-color: #475569; color: #94a3b8; }
        .group-content.collapsed { display: none; }

        /* --- ZÁPASY --- */
        .match { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #334155; position: relative; }
        .match-header { font-size: 12px; color: #94a3b8; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .status-badge { color: #3b82f6; font-weight: bold; text-transform: uppercase; }
        .teams { font-size: 18px; font-weight: bold; margin: 10px 0; }
        .live-score { background: #991b1b; padding: 2px 8px; border-radius: 4px; font-size: 16px; margin: 0 5px; }

        /* --- ŽEBŘÍČEK --- */
        .table-wrap { overflow-x: auto; margin: 20px auto; max-width: 950px; }
        table { width: 100%; background: #1e293b; border-radius: 10px; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px; border-bottom: 1px solid #334155; text-align: center; }
        .my-row { background: #1e294b; border: 1px solid #3b82f6; }
        .bet-info { font-size: 11px; color: #94a3b8; display: block; }

        /* --- ADMIN --- */
        .admin { background: #111827; padding: 15px; display: none; border-radius: 12px; max-width: 800px; margin: 20px auto; border: 2px dashed #ef4444; text-align: left; }
        .admin-section { background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        input, select { padding: 8px; border-radius: 6px; background: #0f172a; color: white; border: 1px solid #334155; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { padding: 10px 15px; border: none; border-radius: 8px; background: #3b82f6; color: white; font-weight: bold; cursor: pointer; }
        .btn-danger { background: #991b1b; } 
        .btn-success { background: #059669; } 
        .btn-alt { background: #475569; }
        .btn-gold { background: #d97706; }
        .btn-disabled { background: #334155; cursor: not-allowed; opacity: 0.5; }
        .btn-small { padding: 4px 8px; font-size: 11px; }
    </style>
</head>
<body>

    <div id="intro"><img src="https://cdn-icons-png.flaticon.com/512/4242/4242141.png" class="logo-intro"></div>

    <div id="authContainer">
        <div class="auth-box" id="loginForm">
            <h2 style="margin-top:0">Přihlášení</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="pass" placeholder="Heslo">
            <button onclick="window.handleLogin()" style="width:100%; margin-top:10px;">Přihlásit se</button>
            <p style="font-size:12px; margin-top:15px; color:#94a3b8">Nemáš účet? <a href="#" onclick="window.toggleAuth(true)" style="color:#3b82f6">Zaregistruj se</a></p>
        </div>
        <div class="auth-box" id="regForm" style="display:none">
            <h2 style="margin-top:0">Registrace</h2>
            <input type="text" id="regName" placeholder="Tvé jméno">
            <input type="email" id="regEmail" placeholder="E-mail">
            <input type="password" id="regPass" placeholder="Heslo (min. 6 znaků)">
            <button onclick="window.handleRegister()" class="btn-success" style="width:100%; margin-top:10px;">Vytvořit účet</button>
            <p style="font-size:12px; margin-top:15px; color:#94a3b8">Máš účet? <a href="#" onclick="window.toggleAuth(false)" style="color:#3b82f6">Přihlas se</a></p>
        </div>
    </div>

    <div id="appUI" style="display:none">
        <h1>Tipovačka</h1>
        <div class="wallet-card">
            <div class="name-tag">
                <span id="displayName">Načítám...</span>
                <button class="btn-alt btn-small" onclick="window.changeMyName()">Změnit jméno</button>
                <button class="btn-danger btn-small" onclick="window.logout()">Odhlásit</button>
            </div>
            <div>Moje peněženka</div>
            <div class="balance-val"><span id="myBalance">0</span> TC</div>
        </div>

        <div id="mainContent">
            <div id="matchesContainer">Načítám zápasy...</div>
            <h2>Žebříček sázkařů</h2>
            <div class="table-wrap"><table id="playersTable"></table></div>
        </div>

        <div id="adminPanel" class="admin">
            <h2 style="text-align:center">Admin Panel</h2>
            <div class="admin-section">
                <h3>Skupiny</h3>
                <div style="display:flex; gap:5px;"><input id="newGroupName" placeholder="Název"><button onclick="window.addGroup()" class="btn-success">Vytvořit</button></div>
                <div id="adminGroupsList" style="margin-top:10px;"></div>
            </div>
            <div class="admin-section">
                <h3>Zápasy</h3>
                <button onclick="window.addMatch()" class="btn-success" style="width:100%">+ Přidat zápas</button>
                <div id="adminMatchesList" style="margin-top:10px;"></div>
            </div>
            <div class="admin-section">
                <h3>Hráči</h3>
                <div id="adminPlayersList"></div>
            </div>
            <button onclick="document.getElementById('adminPanel').style.display='none'" class="btn-alt" style="width:100%">Zavřít</button>
        </div>
        <div style="margin: 20px 0;"><button onclick="window.adminLogin()" class="btn-alt">Admin sekce</button></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyC2xPE4YnIanTiRgrwsoXgoclTyOq0BraE", authDomain: "tipovacka-fce0e.firebaseapp.com", databaseURL: "https://tipovacka-fce0e-default-rtdb.europe-west1.firebasedatabase.app", projectId: "tipovacka-fce0e" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    let state = { matches: {}, groups: {}, players: {}, user: null };

    window.toggleAuth = (s) => { document.getElementById('loginForm').style.display = s ? 'none' : 'block'; document.getElementById('regForm').style.display = s ? 'block' : 'none'; };
    window.handleRegister = () => {
        const n = document.getElementById('regName').value, e = document.getElementById('regEmail').value, p = document.getElementById('regPass').value;
        if(!n) return alert("Jméno!");
        createUserWithEmailAndPassword(auth, e, p).then(u => set(ref(db, `tips/${u.user.uid}`), { name: n, balance: 2500 })).catch(err => alert(err.message));
    };
    window.handleLogin = () => { signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).catch(err => alert(err.message)); };
    window.logout = () => signOut(auth);
    window.changeMyName = () => { const n = prompt("Nové jméno:", state.players[state.user.uid]?.name); if(n) update(ref(db, `tips/${state.user.uid}`), { name: n }); };

    onAuthStateChanged(auth, u => {
        state.user = u;
        document.getElementById('authContainer').style.display = u ? 'none' : 'flex';
        document.getElementById('appUI').style.display = u ? 'block' : 'none';
    });

    window.adminLogin = () => { if (prompt("Heslo:") === "Acsparta333") document.getElementById("adminPanel").style.display = "block"; };
    window.addGroup = () => { const n = document.getElementById("newGroupName").value; if(n) set(ref(db, `groups/g${Date.now()}`), { name: n, order: Date.now() }); };
    window.deleteGroup = (id) => { if(confirm("Smazat?")) remove(ref(db, `groups/${id}`)); };
    window.addMatch = () => { set(ref(db, `matches/m${Date.now()}`), { home:"Tým A", away:"Tým B", date:"1.1. 18:00", group:"none", status:"Plánováno", score:"0:0", closed:false }); };
    window.updateMatch = (id, f, v) => update(ref(db, `matches/${id}`), { [f]: v });
    window.deleteMatch = (id) => { if(confirm("Smazat?")) remove(ref(db, `matches/${id}`)); };
    window.adjustPlayerBalance = (id) => { const v = prompt("+/- TC:"); if(v) { const n = parseInt(v), c = state.players[id]?.balance || 0; update(ref(db, `tips/${id}`), { balance: c + n }); } };
    window.deletePlayer = (id) => { if(confirm("Smazat?")) remove(ref(db, `tips/${id}`)); };

    window.evaluateMatch = (mId) => {
        const m = state.matches[mId]; if(m.status !== "Konec") return alert("Stav Konec!");
        Object.keys(state.players).forEach(pId => {
            const bet = state.players[pId]?.bets?.[mId]; if(!bet) return;
            let mult = 0; const [hS, aS] = m.score.split(":").map(Number), [bH, bA] = bet.tip.split(":").map(Number);
            let win = hS > aS ? "1" : (aS > hS ? "2" : "0"), bWin = bH > bA ? "1" : (bA > bH ? "2" : "0");
            if(bet.tip === m.score) mult = 3; else if(bWin === win) mult = 2;
            if(mult > 0) update(ref(db, `tips/${pId}`), { balance: (state.players[pId].balance || 0) + (bet.stake * mult) });
            remove(ref(db, `tips/${pId}/bets/${mId}`));
        });
        update(ref(db, `matches/${mId}`), { status: "Dohráno", closed: true });
    };

    window.placeBet = (mId) => {
        const m = state.matches[mId]; if(m.closed) return;
        const p = state.players[state.user.uid], exB = p?.bets?.[mId];
        const tip = prompt("Tip (3:2):", exB ? exB.tip : ""); if(!tip || !tip.includes(":")) return;
        let stake = exB ? exB.stake : 0;
        if(!exB) { stake = parseInt(prompt(`Vklad (Máš ${p.balance}):`)); if(isNaN(stake) || stake <= 0 || stake > p.balance) return; update(ref(db, `tips/${state.user.uid}`), { balance: p.balance - stake }); }
        set(ref(db, `tips/${state.user.uid}/bets/${mId}`), { tip, stake });
    };

    onValue(ref(db, "/"), snap => {
        const d = snap.val() || {}; state.matches = d.matches || {}; state.groups = d.groups || {}; state.players = d.tips || {};
        renderAdmin(); renderMain();
    });

    function renderAdmin() {
        const gL = document.getElementById("adminGroupsList"); gL.innerHTML = "";
        Object.keys(state.groups).forEach(id => { gL.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; background:#1e293b; padding:5px; border-radius:5px;">${state.groups[id].name} <button class="btn-danger btn-small" onclick="window.deleteGroup('${id}')">X</button></div>`; });
        const mL = document.getElementById("adminMatchesList"); mL.innerHTML = "";
        Object.keys(state.matches).sort().reverse().forEach(id => {
            const m = state.matches[id]; let gO = `<option value="none">Bez skupiny</option>`;
            Object.keys(state.groups).forEach(gid => { gO += `<option value="${gid}" ${m.group===gid?'selected':''}>${state.groups[gid].name}</option>`; });
            mL.innerHTML += `<div style="background:#1e293b; padding:10px; border-radius:10px; margin-bottom:10px; border:1px solid #334155;">
                <input onchange="window.updateMatch('${id}','home',this.value)" value="${m.home}" style="width:45%"> <input onchange="window.updateMatch('${id}','away',this.value)" value="${m.away}" style="width:45%">
                <select onchange="window.updateMatch('${id}','group',this.value)">${gO}</select>
                <div style="display:flex; gap:5px;"><select onchange="window.updateMatch('${id}','status',this.value)"><option value="Plánováno" ${m.status==='Plánováno'?'selected':''}>Plánováno</option><option value="Konec" ${m.status==='Konec'?'selected':''}>Konec</option><option value="Dohráno" ${m.status==='Dohráno'?'selected':''}>Dohráno</option></select>
                <input onchange="window.updateMatch('${id}','score',this.value)" value="${m.score}" style="width:50px"></div>
                <button class="btn-gold btn-small" onclick="window.evaluateMatch('${id}')">Vyhodnotit</button> <button class="btn-alt btn-small" onclick="window.updateMatch('${id}','closed',${!m.closed})">${m.closed?'Otevřít':'Zavřít'}</button> <button class="btn-danger btn-small" onclick="window.deleteMatch('${id}')">X</button></div>`;
        });
        const pL = document.getElementById("adminPlayersList"); pL.innerHTML = "";
        Object.keys(state.players).forEach(id => { const p = state.players[id]; pL.innerHTML += `<div style="background:#1e293b; padding:8px; border-radius:8px; margin-bottom:5px;">${p.name}: ${p.balance} TC <button onclick="window.adjustPlayerBalance('${id}')" class="btn-small">+/-</button> <button onclick="window.deletePlayer('${id}')" class="btn-danger btn-small">X</button></div>`; });
    }

    function renderMain() {
        if(!state.user || !state.players[state.user.uid]) return;
        const curP = state.players[state.user.uid];
        document.getElementById("myBalance").innerText = curP.balance;
        document.getElementById("displayName").innerText = curP.name;
        const cont = document.getElementById("matchesContainer"); cont.innerHTML = "";
        const sG = Object.keys(state.groups).sort((a,b) => state.groups[a].order - state.groups[b].order);
        [...sG, "none"].forEach(gId => {
            const gM = Object.keys(state.matches).filter(mid => state.matches[mid].group === gId);
            if(gM.length === 0) return;
            const allF = gM.every(mId => state.matches[mId].status === 'Dohráno');
            let gH = `<div class="group-container"><div class="group-header ${allF?'finished':''}" onclick="this.nextElementSibling.classList.toggle('collapsed')">${gId==="none"?"Ostatní":state.groups[gId].name} <span>▼</span></div><div class="group-content collapsed">`;
            gM.forEach(mId => {
                const m = state.matches[mId], b = curP.bets?.[mId];
                gH += `<div class="match"><div class="match-header"><span>${m.date}</span> <span class="status-badge">${m.status}</span></div>
                    <div class="teams">${m.home} ${m.status!=='Plánováno'?`<span class="live-score">${m.score}</span>`:'vs'} ${m.away}</div>
                    ${b ? `<div style="color:#6ee7b7; font-size:13px;">Tip: ${b.tip} (${b.stake} TC)</div>` : `<button onclick="window.placeBet('${mId}')" ${m.closed?'disabled':''}>${m.closed?'Zavřeno':'Vsadit'}</button>`}</div>`;
            });
            cont.innerHTML += gH + "</div></div>";
        });
        const table = document.getElementById("playersTable");
        let ps = Object.keys(state.players).sort((a,b) => state.players[b].balance - state.players[a].balance);
        let hH = `<tr><th>#</th><th>Hráč</th><th>TC</th><th>Sázky</th></tr>`;
        ps.forEach((pid, idx) => {
            const p = state.players[pid]; let bH = "";
            if(p.bets) Object.keys(p.bets).forEach(mid => { if(state.matches[mid]) bH += `<span class="bet-info">${state.matches[mid].home.slice(0,3)}-${state.matches[mid].away.slice(0,3)}: ${p.bets[mid].tip}</span>`; });
            hH += `<tr class="${pid===state.user.uid?'my-row':''}"><td>${idx+1}.</td><td>${p.name}</td><td><b>${p.balance}</b></td><td>${bH}</td></tr>`;
        });
        table.innerHTML = hH;
    }
    window.addEventListener('load', () => setTimeout(() => document.getElementById('intro').classList.add('hidden'), 1200));
</script>
</body>
</html>
