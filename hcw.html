<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HIGHER CARD WINS</title>

    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/15661/15661093.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/15661/15661093.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #0b0f1a; 
            color: #e2e8f0; 
            text-align: center; 
            margin: 0; 
            padding: 10px; 
        }

        .container { max-width: 500px; margin: 0 auto; }

        h1 { color: #3b82f6; text-transform: uppercase; letter-spacing: 2px; margin: 15px 0; }

        .auth-box, .menu-box, .game-area { 
            background: #161e2d; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #2d3748; 
            margin-top: 15px;
        }

        .stats-bar { 
            background: #1e293b; 
            padding: 12px; 
            border-radius: 10px; 
            margin-bottom: 15px;
            border-bottom: 2px solid #3b82f6;
            font-size: 14px;
            display: flex;
            justify-content: space-around;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 8px; 
            border: 1px solid #2d3748; 
            background: #0b0f1a; 
            color: white; 
            font-size: 16px; 
            box-sizing: border-box;
        }

        .btn { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: 14px;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn-blue { background: #3b82f6; color: white; }
        .btn-green { background: #10b981; color: white; }
        .btn-red { background: #ef4444; color: white; }

        .card-slot { 
            display: inline-block; 
            width: 80px; 
            height: 120px; 
            background: #0f172a; 
            border-radius: 8px; 
            margin: 5px; 
            border: 1px dashed #3b82f6;
            vertical-align: top;
        }

        .card-img { width: 100%; height: 100%; border-radius: 8px; }

        #log { 
            background: #0f172a; 
            padding: 10px; 
            border-radius: 8px; 
            margin-top: 15px; 
            font-size: 12px; 
            height: 80px; 
            overflow-y: auto; 
            color: #94a3b8; 
            text-align: left;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🃏 HIGHER CARD</h1>

    <div id="authScreen" class="auth-box">
        <h3 style="margin-top:0">Přihlášení do Tipovačky</h3>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Heslo">
        <button id="btnLogin" class="btn btn-blue">Vstoupit</button>
    </div>

    <div id="menuScreen" class="menu-box hidden">
        <div class="stats-bar">
            <span>👤 <strong id="userName">...</strong></span>
            <span>💰 <strong id="userCoins">0</strong> C</span>
        </div>
        <button id="btnStartGame" class="btn btn-green">Hrát o Coiny</button>
        <button id="btnLogout" class="btn btn-red" style="margin-top:20px; font-size:10px; padding:8px;">Odhlásit</button>
    </div>

    <div id="gameScreen" class="game-area hidden">
        <div class="stats-bar">
            <span>BANK: <strong id="pot">0</strong> C</span>
            <span>TVOJE: <strong id="liveCoins">0</strong> C</span>
        </div>

        <div style="margin: 20px 0;">
            <div id="p1" class="card-slot"></div>
            <div id="p2" class="card-slot"></div>
            <div id="p3" class="card-slot"></div>
            <div style="margin-top: 10px;">
                <div id="p0" class="card-slot" style="border: 2px solid #10b981; width: 100px; height: 150px;"></div>
                <div style="font-size: 12px; color: #10b981;">MOJE KARTA</div>
            </div>
        </div>

        <div id="betControls">
            <input type="number" id="betInput" placeholder="Sázka (min 10)...">
            <button id="btnPlay" class="btn btn-blue">Ukázat karty</button>
        </div>

        <button id="btnNext" class="btn btn-green hidden">Další kolo</button>
        <div id="log"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC2xPE4YnIanTiRgrwsoXgoclTyOq0BraE",
        authDomain: "tipovacka-fce0e.firebaseapp.com",
        databaseURL: "https://tipovacka-fce0e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "tipovacka-fce0e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const cards = ["7_h","8_h","9_h","t_h","j_h","q_h","k_h","a_h","7_s","8_s","9_s","t_s","j_s","q_s","k_s","a_s","7_d","8_d","9_d","t_d","j_d","q_d","k_d","a_d","7_c","8_c","9_c","t_c","j_c","q_c","k_c","a_c"];
    const IMAGE_BASE = "https://hra-lora.cz/assets/cardsmini/";

    let currentUser = null;
    let userData = null;
    let gameState = { active: false, lastBet: 0, players: [] };

    function getVal(c) {
        const r = c.split('_')[0];
        if(r === 't') return 10;
        if(r === 'j') return 11;
        if(r === 'q') return 12;
        if(r === 'k') return 13;
        if(r === 'a') return 14;
        return parseInt(r);
    }

    // --- AUTH ---
    document.getElementById('btnLogin').onclick = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, e, p).catch(err => alert("Chyba: " + err.message));
    };

    onAuthStateChanged(auth, user => {
        if(user) {
            currentUser = user;
            onValue(ref(db, `tips/${user.uid}`), snap => {
                userData = snap.val();
                if(userData) {
                    document.getElementById('userName').innerText = userData.name;
                    document.getElementById('userCoins').innerText = userData.coins || 0;
                    document.getElementById('liveCoins').innerText = userData.coins || 0;
                    document.getElementById('authScreen').classList.add('hidden');
                    document.getElementById('menuScreen').classList.remove('hidden');
                }
            });
        } else {
            location.reload();
        }
    });

    document.getElementById('btnLogout').onclick = () => signOut(auth);

    // --- GAME ---
    document.getElementById('btnStartGame').onclick = () => {
        document.getElementById('menuScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.remove('hidden');
        initRound();
    };

    function initRound() {
        gameState.active = true;
        document.getElementById('btnNext').classList.add('hidden');
        document.getElementById('betControls').classList.remove('hidden');
        
        gameState.players = [
            { card: cards[Math.floor(Math.random()*cards.length)] },
            { card: cards[Math.floor(Math.random()*cards.length)] },
            { card: cards[Math.floor(Math.random()*cards.length)] },
            { card: cards[Math.floor(Math.random()*cards.length)] }
        ];

        renderCards(false);
    }

    function renderCards(reveal) {
        gameState.players.forEach((p, i) => {
            const slot = document.getElementById(`p${i}`);
            slot.innerHTML = (reveal || i === 0) 
                ? `<img src="${IMAGE_BASE}${p.card}.jpg" class="card-img">`
                : `<img src="${IMAGE_BASE}back.jpg" class="card-img">`;
        });
    }

    document.getElementById('btnPlay').onclick = () => {
        if(!gameState.active) return;
        const bet = parseInt(document.getElementById('betInput').value);
        if(isNaN(bet) || bet < 10) return alert("Min. sázka je 10 C!");
        if(bet > userData.coins) return alert("Nemáš dost Coinů!");

        gameState.active = false;
        gameState.lastBet = bet;
        
        // Okamžitý odečet sázky
        update(ref(db, `tips/${currentUser.uid}`), { coins: userData.coins - bet }).then(() => {
            evaluate();
        });
    };

    function evaluate() {
        renderCards(true);
        const myCard = gameState.players[0].card;
        const myRawVal = myCard.split('_')[0].toLowerCase();
        let myVal = getVal(myCard);
        let b1Val = getVal(gameState.players[1].card);
        let b2Val = getVal(gameState.players[2].card);
        let b3Val = getVal(gameState.players[3].card);
        let maxBot = Math.max(b1Val, b2Val, b3Val);

        let multiplier = 5; 
        if (myRawVal === 'a') multiplier = 1.2;
        else if (myRawVal === 'k') multiplier = 1.5;
        else if (myRawVal === 'q') multiplier = 2;
        else if (myRawVal === 'j') multiplier = 2.5;
        else if (myRawVal === 't') multiplier = 3;

        if(myVal > maxBot) {
            let win = Math.floor(gameState.lastBet * multiplier);
            addLog(`VYHRÁL JSI! Karta: ${myRawVal.toUpperCase()}, Násobek: ${multiplier}x, Výhra: ${win} C!`);
            update(ref(db, `tips/${currentUser.uid}`), { coins: userData.coins + win });
        } else if(myVal === maxBot) {
            addLog("REMÍZA! Sázka vrácena.");
            update(ref(db, `tips/${currentUser.uid}`), { coins: userData.coins + gameState.lastBet });
        } else {
            addLog("Prohrál jsi vše.");
        }

        document.getElementById('betControls').classList.add('hidden');
        document.getElementById('btnNext').classList.remove('hidden');
    }

    document.getElementById('btnNext').onclick = () => {
        if(userData.coins < 10) {
            alert("Bankrot! Nemáš na další hru.");
            location.reload();
        } else {
            initRound();
        }
    };

    function addLog(m) {
        const l = document.getElementById('log');
        l.innerHTML = `> ${m}<br>` + l.innerHTML;
    }
</script>
</body>
</html>
